name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install MinGW
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-i686

      - name: Build pmc_bb.dll
        run: make mingw

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: pmc_bb.dll
